
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GFDHub — AI Offensive Coordinator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800;900&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080d;--s1:#0d0f18;--s2:#12151f;--s3:#181c2a;--s4:#1e2233;
  --b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.1);
  --ac:#00e5a0;--ac2:rgba(0,229,160,0.1);
  --red:#ff4d6a;--amb:#ffb347;--blu:#4da6ff;--pur:#b47aff;
  --t1:#f0f2f9;--t2:#6e7a94;--t3:#353c52;
  --fd:'Exo 2',sans-serif;--fb:'Figtree',sans-serif;
  --topbar-h:54px;
  /* Position colors */
  --qb:#ffb347;--rb:#00e5a0;--wr:#4da6ff;--te:#b47aff;--k:#6e7a94;
}
body{background:var(--bg);font-family:var(--fb);color:var(--t1);height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:var(--topbar-h);background:var(--s1);border-bottom:1px solid var(--b1);flex-shrink:0;gap:8px}
.tb-left{display:flex;align-items:center;gap:10px;min-width:0}
.logo{font-family:var(--fd);font-weight:900;font-size:18px;letter-spacing:-.5px;color:var(--t1);text-decoration:none;flex-shrink:0}
.logo em{color:var(--ac);font-style:normal}
.oc-badge{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--ac);background:var(--ac2);border:1px solid rgba(0,229,160,.18);padding:3px 10px;border-radius:20px;font-family:var(--fd);white-space:nowrap}
.oc-dot{width:5px;height:5px;border-radius:50%;background:var(--ac);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.tb-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.user-pill{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--b1);border-radius:20px;padding:4px 10px 4px 5px;font-size:12px;color:var(--t2)}
.user-ava{width:26px;height:26px;border-radius:50%;background:var(--ac2);border:1px solid rgba(0,229,160,.3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--ac);font-family:var(--fd);flex-shrink:0}
.user-name-text{display:inline}
.season-badge{font-size:10px;font-weight:700;color:var(--amb);background:rgba(255,179,71,.1);border:1px solid rgba(255,179,71,.2);padding:3px 10px;border-radius:20px;font-family:var(--fd);white-space:nowrap}
.nav-link{font-size:13px;color:var(--t2);text-decoration:none;transition:color .12s;padding:4px 10px;border-radius:6px;white-space:nowrap}
.nav-link:hover{color:var(--t1);background:var(--s2)}
.hamburger{display:none;flex-direction:column;justify-content:center;gap:4px;width:36px;height:36px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;cursor:pointer;padding:8px;flex-shrink:0}
.hamburger span{display:block;height:2px;background:var(--t2);border-radius:1px;transition:all .2s}
.hamburger.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}

/* ── MAIN LAYOUT ── */
.main{display:flex;flex:1;overflow:hidden;position:relative}

/* ── LEFT SIDEBAR ── */
.lsb{width:224px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:transform .25s ease}
.lsb-head{padding:16px 16px 10px;border-bottom:1px solid var(--b1)}
.lsb-title{font-family:var(--fd);font-size:10.5px;font-weight:800;letter-spacing:.9px;text-transform:uppercase;color:var(--t3)}
.mem-section{padding:10px 12px;border-bottom:1px solid var(--b1)}
.mem-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t3);margin-bottom:7px;font-family:var(--fd)}
.mem-item{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:5px;font-size:11.5px;color:var(--t2);margin-bottom:2px}
.mem-dot{width:5px;height:5px;border-radius:50%;background:var(--ac);flex-shrink:0}
.mem-dot.red{background:var(--red)}
.mem-dot.amb{background:var(--amb)}
.hist-item{display:flex;align-items:flex-start;gap:6px;padding:5px 6px;border-radius:5px;font-size:11px;color:var(--t2);margin-bottom:2px;cursor:pointer;transition:background .12s;line-height:1.4}
.hist-item:hover{background:var(--s2)}
.hist-week{color:var(--t3);font-size:9.5px;flex-shrink:0;margin-top:1px;font-family:var(--fd);font-weight:700}

/* ── WATCHLIST ── */
.watchlist-empty{font-size:11px;color:var(--t3);padding:6px;line-height:1.5;font-style:italic}
.wl-tile{display:flex;align-items:center;gap:8px;padding:6px 6px;border-radius:7px;cursor:pointer;transition:background .12s;margin-bottom:3px;position:relative}
.wl-tile:hover{background:var(--s2)}
.wl-init{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;font-family:var(--fd);flex-shrink:0;letter-spacing:-.3px}
.wl-init.qb{background:rgba(255,179,71,.15);color:var(--qb);border:1px solid rgba(255,179,71,.3)}
.wl-init.rb{background:rgba(0,229,160,.1);color:var(--rb);border:1px solid rgba(0,229,160,.2)}
.wl-init.wr{background:rgba(77,166,255,.1);color:var(--wr);border:1px solid rgba(77,166,255,.2)}
.wl-init.te{background:rgba(180,122,255,.1);color:var(--te);border:1px solid rgba(180,122,255,.2)}
.wl-init.k,.wl-init.def{background:var(--s3);color:var(--t2);border:1px solid var(--b1)}
.wl-info{flex:1;min-width:0}
.wl-name{font-size:12px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--fd)}
.wl-meta{font-size:10px;color:var(--t3);display:flex;align-items:center;gap:4px;margin-top:1px}
.wl-status{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.wl-status.ok{background:var(--ac)}
.wl-status.q{background:var(--amb)}
.wl-status.ir{background:var(--red)}
.wl-remove{opacity:0;width:16px;height:16px;border-radius:50%;background:var(--s3);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:opacity .15s;font-size:9px;color:var(--t3)}
.wl-tile:hover .wl-remove{opacity:1}
.wl-remove:hover{background:rgba(255,77,106,.15);border-color:var(--red);color:var(--red)}

.lsb-footer{padding:12px;margin-top:auto}
.clear-btn{padding:7px;background:var(--s2);border:1px solid var(--b1);border-radius:7px;font-size:11.5px;color:var(--t3);cursor:pointer;font-family:var(--fb);text-align:center;transition:all .12s;width:100%}
.clear-btn:hover{border-color:var(--b2);color:var(--t2)}

/* ── CHAT ── */
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.messages{flex:1;overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:14px;scrollbar-width:thin;scrollbar-color:var(--s3) transparent}
.msg{display:flex;gap:9px;align-items:flex-start;animation:msgIn .2s ease both}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-ava{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--fd)}
.msg-ava.oc{background:var(--ac2);border:1px solid rgba(0,229,160,.3);color:var(--ac)}
.msg-ava.user{background:var(--s3);border:1px solid var(--b1);color:var(--t2)}
.msg-body{max-width:82%;display:flex;flex-direction:column;gap:4px}
.msg.user .msg-body{align-items:flex-end}
.bubble{padding:11px 14px;border-radius:10px;font-size:13.5px;line-height:1.65;word-break:break-word}
.bubble.oc{background:var(--s2);border:1px solid var(--b1);color:var(--t1);border-radius:10px 10px 10px 2px}
.bubble.user{background:var(--ac2);border:1px solid rgba(0,229,160,.2);color:var(--t1);border-radius:10px 10px 2px 10px}
.bubble b{color:var(--ac);font-weight:700}
.call-tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:800;padding:3px 10px;border-radius:12px;font-family:var(--fd);margin:2px 0 6px}
.call-start{background:var(--ac);color:#041a0f}
.call-sit{background:var(--red);color:#fff}
.call-add{background:var(--amb);color:#041a0f}
.call-drop{background:var(--s3);color:var(--red);border:1px solid var(--red)}
.msg-time{font-size:10px;color:var(--t3)}

/* ── TYPING ── */
.typing{display:none;align-items:center;gap:9px;padding:0 16px 8px}
.typing.show{display:flex}
.typing-ava{width:32px;height:32px;border-radius:50%;background:var(--ac2);border:1px solid rgba(0,229,160,.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--ac);font-family:var(--fd);flex-shrink:0}
.dots{display:flex;gap:4px;padding:11px 14px;background:var(--s2);border:1px solid var(--b1);border-radius:10px 10px 10px 2px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--t3);animation:bounce .8s infinite}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px);background:var(--ac)}}

/* ── INPUT BAR ── */
.input-bar{padding:10px 14px 12px;background:var(--s1);border-top:1px solid var(--b1);flex-shrink:0}
.ctx-bar{display:flex;align-items:center;gap:8px;padding:0 0 8px;font-size:11px;color:var(--t3);flex-wrap:wrap}
.ctx-item{display:flex;align-items:center;gap:4px}
.ctx-dot{width:4px;height:4px;border-radius:50%;background:var(--ac)}
.quick-asks{display:flex;gap:5px;flex-wrap:nowrap;overflow-x:auto;margin-bottom:9px;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.quick-asks::-webkit-scrollbar{display:none}
.qa{padding:5px 12px;font-size:12px;color:var(--t2);background:var(--s2);border:1px solid var(--b1);border-radius:20px;cursor:pointer;font-family:var(--fb);transition:all .12s;white-space:nowrap;flex-shrink:0}
.qa:hover,.qa:active{border-color:var(--b2);color:var(--t1)}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-box{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:11px 14px;font-size:14px;color:var(--t1);font-family:var(--fb);resize:none;outline:none;transition:border-color .15s;min-height:44px;max-height:120px;line-height:1.5}
.input-box:focus{border-color:var(--ac)}
.input-box::placeholder{color:var(--t3)}
.send-btn{width:44px;height:44px;background:var(--ac);border:none;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.send-btn:hover{background:#00ffb0;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,229,160,.25)}
.send-btn svg{width:18px;height:18px;fill:none;stroke:#041a0f;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.send-btn:disabled{background:var(--s3);cursor:not-allowed;transform:none;box-shadow:none}
.send-btn:disabled svg{stroke:var(--t3)}

/* ── PLAYER PANEL (slide-in from right) ── */
.player-panel{position:fixed;top:0;right:0;bottom:0;width:320px;background:var(--s1);border-left:1px solid var(--b1);z-index:60;transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column;overflow:hidden}
.player-panel.open{transform:translateX(0)}
.pp-header{padding:16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:12px;flex-shrink:0}
.pp-close{width:28px;height:28px;border-radius:6px;background:var(--s2);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:14px;flex-shrink:0;transition:all .12s;margin-left:auto}
.pp-close:hover{border-color:var(--b2);color:var(--t1)}
.pp-init{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;font-family:var(--fd);flex-shrink:0}
.pp-name{font-family:var(--fd);font-size:16px;font-weight:800;color:var(--t1);letter-spacing:-.3px}
.pp-sub{font-size:11px;color:var(--t2);margin-top:2px;display:flex;align-items:center;gap:5px}
.pp-status{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;font-family:var(--fd)}
.pp-status.ok{background:rgba(0,229,160,.1);color:var(--ac);border:1px solid rgba(0,229,160,.2)}
.pp-status.q{background:rgba(255,179,71,.1);color:var(--amb);border:1px solid rgba(255,179,71,.2)}
.pp-status.ir{background:rgba(255,77,106,.1);color:var(--red);border:1px solid rgba(255,77,106,.2)}
.pp-body{flex:1;overflow-y:auto;padding:16px}
.pp-section{margin-bottom:20px}
.pp-section-label{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--t3);font-family:var(--fd);margin-bottom:10px}
.pp-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.pp-stat{background:var(--s2);border:1px solid var(--b1);border-radius:9px;padding:10px 8px;text-align:center}
.pp-stat-val{font-size:18px;font-weight:900;color:var(--t1);font-family:var(--fd);letter-spacing:-.5px}
.pp-stat-val.highlight{color:var(--ac)}
.pp-stat-label{font-size:9px;color:var(--t3);margin-top:3px;font-family:var(--fd);font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.pp-game-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--b1);font-size:12px}
.pp-game-row:last-child{border-bottom:none}
.pp-game-opp{color:var(--t2)}
.pp-game-val{color:var(--t1);font-weight:600;font-family:var(--fd)}
.pp-loading{text-align:center;padding:30px 0;color:var(--t3);font-size:13px}
.pp-loading-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ac);animation:bounce .8s infinite;margin:0 2px}
.pp-loading-dot:nth-child(2){animation-delay:.15s}
.pp-loading-dot:nth-child(3){animation-delay:.3s}
.pp-ask-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:12px;background:var(--ac);color:#041a0f;font-size:14px;font-weight:800;border:none;border-radius:9px;cursor:pointer;font-family:var(--fd);letter-spacing:-.2px;transition:all .15s;margin-top:4px}
.pp-ask-btn:hover{background:#00ffb0;transform:translateY(-1px)}
.pp-ask-btn svg{width:14px;height:14px;fill:none;stroke:#041a0f;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.pp-footer{padding:14px 16px;border-top:1px solid var(--b1);flex-shrink:0}

/* ── OVERLAY ── */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:40;backdrop-filter:blur(2px)}
.drawer-overlay.show{display:block}
.panel-overlay{display:none;position:fixed;inset:0;z-index:55}
.panel-overlay.show{display:block}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}

/* ══════════════════════════════════════
   MOBILE  ≤ 640px
══════════════════════════════════════ */
@media(max-width:640px){
  .topbar{padding:0 12px}
  .oc-badge{font-size:9px;padding:3px 8px;letter-spacing:.5px}
  .nav-link{display:none}
  .season-badge{display:none}
  .user-name-text{display:none}
  .user-pill{padding:4px 6px}
  .hamburger{display:flex}
  .lsb{position:fixed;top:var(--topbar-h);left:0;right:0;bottom:0;width:100%;z-index:50;transform:translateX(-100%);border-right:none;border-top:1px solid var(--b1);overflow-y:auto}
  .lsb.open{transform:translateX(0)}
  .chat-wrap{width:100%}
  .messages{padding:14px 12px;gap:12px}
  .msg-body{max-width:88%}
  .bubble{font-size:13px;padding:10px 13px}
  .input-bar{padding:8px 12px 10px}
  .ctx-bar{font-size:10.5px;gap:6px;padding-bottom:6px}
  .input-box{font-size:16px}
  .quick-asks{margin-bottom:8px}
  .player-panel{width:100%}
}
@media(max-width:380px){
  .logo{font-size:16px}
  .oc-badge{display:none}
  .bubble{font-size:12.5px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-left">
    <a href="index.html" class="logo">GFD<em>Hub</em></a>
    <div class="oc-badge"><div class="oc-dot"></div>AI Offensive Coordinator</div>
  </div>
  <div class="tb-right">
    <a href="index.html" class="nav-link">News Feed</a>
    <div class="user-pill">
      <div class="user-ava" id="userInitials">?</div>
      <span class="user-name-text" id="userName">Loading...</span>
    </div>
    <div class="season-badge">PRO · 2026 Season</div>
    <button class="hamburger" id="hamburger" onclick="toggleDrawer()" aria-label="Profile">
      <span></span><span></span><span></span>
    </button>
  </div>
</div>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="panel-overlay" id="panelOverlay" onclick="closePlayerPanel()"></div>

<div class="main">
  <div class="lsb" id="lsb">
    <div class="lsb-head"><div class="lsb-title">Your Profile</div></div>

    <div class="mem-section">
      <div class="mem-label">League context</div>
      <div id="leagueContext"></div>
    </div>

    <!-- WATCHLIST -->
    <div class="mem-section" style="flex:1">
      <div class="mem-label" style="display:flex;align-items:center;justify-content:space-between">
        Watchlist
        <span id="wlCount" style="font-size:9px;color:var(--t3);font-weight:400;font-family:var(--fb)"></span>
      </div>
      <div id="watchlistPanel"></div>
    </div>

    <div class="mem-section">
      <div class="mem-label">Recent questions</div>
      <div id="historyContext"></div>
    </div>

    <div class="lsb-footer">
      <button class="clear-btn" onclick="clearChat()">Clear conversation</button>
    </div>
  </div>

  <div class="chat-wrap">
    <div class="messages" id="messages"></div>
    <div class="typing" id="typing">
      <div class="typing-ava">OC</div>
      <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
    <div class="input-bar">
      <div class="ctx-bar" id="ctxBar"></div>
      <div class="quick-asks">
        <div class="qa" onclick="quickAsk('What is my optimal starting lineup this week?')">Full lineup</div>
        <div class="qa" onclick="quickAsk('Who should I add off waivers this week?')">Waiver wire</div>
        <div class="qa" onclick="quickAsk('What are the most important injury updates I need to know?')">Injury alerts</div>
        <div class="qa" onclick="quickAsk('Do I have any must-start players this week?')">Must starts</div>
        <div class="qa" onclick="quickAsk('Any players I should consider trading away?')">Trade targets</div>
      </div>
      <div class="input-row">
        <textarea class="input-box" id="inputBox" placeholder='Ask your AI OC anything...' rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- PLAYER PANEL -->
<div class="player-panel" id="playerPanel">
  <div class="pp-header">
    <div class="pp-init" id="ppInit"></div>
    <div>
      <div class="pp-name" id="ppName">—</div>
      <div class="pp-sub">
        <span id="ppMeta">—</span>
        <span class="pp-status" id="ppStatus"></span>
      </div>
    </div>
    <button class="pp-close" onclick="closePlayerPanel()">✕</button>
  </div>
  <div class="pp-body" id="ppBody">
    <div class="pp-loading">
      <div class="pp-loading-dot"></div>
      <div class="pp-loading-dot"></div>
      <div class="pp-loading-dot"></div>
    </div>
  </div>
  <div class="pp-footer">
    <button class="pp-ask-btn" id="ppAskBtn" onclick="askAboutPlayer()">
      Ask AI OC about this player
      <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>
  </div>
</div>

<script>
const API = 'https://api.gfdhub.com';
let USER = null;
let CONTEXT = null;
const MSGS = [];
let WAITING = false;
let WATCHLIST = []; // [{name, pos, team, status}]
let ACTIVE_PLAYER = null;

/* ── POS COLOR CLASS ── */
function posClass(pos) {
  if (!pos) return 'k';
  const p = pos.toUpperCase();
  if (p.startsWith('QB')) return 'qb';
  if (p.startsWith('RB')) return 'rb';
  if (p.startsWith('WR')) return 'wr';
  if (p.startsWith('TE')) return 'te';
  return 'k';
}

function posInitials(name) {
  if (!name) return '?';
  const parts = name.trim().split(' ');
  if (parts.length >= 2) return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
  return name.slice(0,2).toUpperCase();
}

/* ── WATCHLIST ── */
function renderWatchlist() {
  const panel = document.getElementById('watchlistPanel');
  const count = document.getElementById('wlCount');
  count.textContent = WATCHLIST.length ? `${WATCHLIST.length} player${WATCHLIST.length>1?'s':''}` : '';
  if (!WATCHLIST.length) {
    panel.innerHTML = `<div class="watchlist-empty">Players you ask about appear here automatically.</div>`;
    return;
  }
  panel.innerHTML = WATCHLIST.map((p, i) => `
    <div class="wl-tile" onclick="openPlayerPanel(${i})">
      <div class="wl-init ${posClass(p.pos)}">${posInitials(p.name)}</div>
      <div class="wl-info">
        <div class="wl-name">${p.name}</div>
        <div class="wl-meta">
          <div class="wl-status ${p.status||'ok'}"></div>
          <span>${p.pos||'?'}${p.team?' · '+p.team:''}</span>
        </div>
      </div>
      <div class="wl-remove" onclick="event.stopPropagation();removeFromWatchlist(${i})" title="Remove">✕</div>
    </div>
  `).join('');
}

function addToWatchlist(name, pos='', team='', status='ok') {
  if (!name) return;
  const exists = WATCHLIST.find(p => p.name.toLowerCase() === name.toLowerCase());
  if (exists) return;
  WATCHLIST.unshift({ name, pos, team, status });
  renderWatchlist();
  saveWatchlist();
}

function removeFromWatchlist(idx) {
  WATCHLIST.splice(idx, 1);
  renderWatchlist();
  saveWatchlist();
}

async function saveWatchlist() {
  if (!USER?.email || USER.email === 'demo@gfdhub.com') return;
  try {
    await fetch(`${API}/api/user/context`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: USER.email, watchlist: WATCHLIST })
    });
  } catch(e) { console.log('Watchlist save:', e.message); }
}

/* ── EXTRACT PLAYER NAMES FROM USER MESSAGE ── */
// Looks for capitalized name patterns (First Last) in user messages
function extractPlayerNames(text) {
  const names = [];
  // Match "FirstName LastName" patterns — two+ capitalized words
  const matches = text.match(/\b([A-Z][a-z]+(?:\s+[A-Z][a-z']+)+)\b/g) || [];
  matches.forEach(m => {
    // Filter out common non-player phrases
    const skip = ['What Is','Who Should','Should I','Tell Me','My Team','This Week','Last Week','Trade Value','Waiver Wire','Fantasy Points','Full Lineup','Must Start'];
    if (!skip.some(s => m.includes(s)) && m.split(' ').length <= 3) {
      names.push(m);
    }
  });
  return [...new Set(names)];
}

async function resolveAndAddPlayers(names) {
  for (const name of names) {
    try {
      const res = await fetch(`${API}/api/player/search?name=${encodeURIComponent(name)}`);
      const data = await res.json();
      if (data.players && data.players.length > 0) {
        const p = data.players[0];
        addToWatchlist(p.name, p.pos, p.team, 'ok');
      }
    } catch(e) { /* silent */ }
  }
}

/* ── PLAYER PANEL ── */
async function openPlayerPanel(idx) {
  const player = WATCHLIST[idx];
  if (!player) return;
  ACTIVE_PLAYER = player;

  // Set header
  const initEl = document.getElementById('ppInit');
  initEl.textContent = posInitials(player.name);
  initEl.className = `pp-init ${posClass(player.pos)}`;
  document.getElementById('ppName').textContent = player.name;
  document.getElementById('ppMeta').textContent = `${player.pos||'?'}${player.team?' · '+player.team:''}`;

  const statusEl = document.getElementById('ppStatus');
  if (player.status === 'ir') { statusEl.textContent = 'IR'; statusEl.className = 'pp-status ir'; }
  else if (player.status === 'q') { statusEl.textContent = 'Q'; statusEl.className = 'pp-status q'; }
  else { statusEl.textContent = 'Active'; statusEl.className = 'pp-status ok'; }

  // Show loading
  document.getElementById('ppBody').innerHTML = `<div class="pp-loading">
    <div class="pp-loading-dot"></div><div class="pp-loading-dot"></div><div class="pp-loading-dot"></div>
  </div>`;

  document.getElementById('playerPanel').classList.add('open');
  document.getElementById('panelOverlay').classList.add('show');

  // Fetch Tank01 data
  try {
    // Search for playerID
    const searchRes = await fetch(`${API}/api/player/search?name=${encodeURIComponent(player.name)}`);
    const searchData = await searchRes.json();
    const playerID = searchData.players?.[0]?.playerID;

    if (!playerID) {
      document.getElementById('ppBody').innerHTML = `<div style="color:var(--t3);font-size:13px;padding:20px 0;text-align:center">No usage data available yet for this player.</div>`;
      return;
    }

    const usageRes = await fetch(`${API}/api/player/usage?playerID=${playerID}&games=6`);
    const usageData = await usageRes.json();
    renderPlayerPanel(usageData);
  } catch(e) {
    document.getElementById('ppBody').innerHTML = `<div style="color:var(--t3);font-size:13px;padding:20px 0;text-align:center">Couldn't load usage data right now.</div>`;
  }
}

function renderPlayerPanel(data) {
  const s = data.summary || {};
  const games = data.games || [];

  const isRB = ACTIVE_PLAYER?.pos?.toUpperCase().startsWith('RB');
  const isWR = ACTIVE_PLAYER?.pos?.toUpperCase().startsWith('WR');
  const isTE = ACTIVE_PLAYER?.pos?.toUpperCase().startsWith('TE');
  const isSkill = isRB || isWR || isTE;

  let html = '';

  // Usage summary stats
  html += `<div class="pp-section">
    <div class="pp-section-label">Last ${s.games||6} games — usage</div>
    <div class="pp-stats">`;

  if (isSkill) {
    html += `
      <div class="pp-stat">
        <div class="pp-stat-val highlight">${s.snapShare||'N/A'}</div>
        <div class="pp-stat-label">Snap %</div>
      </div>`;
  }
  if (isWR || isTE) {
    html += `
      <div class="pp-stat">
        <div class="pp-stat-val highlight">${s.targetShare||'N/A'}</div>
        <div class="pp-stat-label">Target %</div>
      </div>
      <div class="pp-stat">
        <div class="pp-stat-val">${s.avgTargets||'0'}</div>
        <div class="pp-stat-label">Avg Tgts</div>
      </div>`;
  }
  if (isRB) {
    html += `
      <div class="pp-stat">
        <div class="pp-stat-val highlight">${s.carryShare||'N/A'}</div>
        <div class="pp-stat-label">Carry %</div>
      </div>
      <div class="pp-stat">
        <div class="pp-stat-val">${s.avgCarries||'0'}</div>
        <div class="pp-stat-label">Avg Carries</div>
      </div>`;
  }
  if (!isSkill) {
    html += `
      <div class="pp-stat">
        <div class="pp-stat-val">${s.avgSnaps||'N/A'}</div>
        <div class="pp-stat-label">Avg Snaps</div>
      </div>`;
  }

  html += `</div></div>`;

  // Recent game log
  if (games.length) {
    html += `<div class="pp-section">
      <div class="pp-section-label">Recent game log</div>`;
    games.slice(0,5).forEach(g => {
      const val = isWR||isTE ? `${g.targets} tgt · ${g.receptions} rec · ${g.recYards} yds`
                : isRB ? `${g.carries} car · ${g.rushYards} yds`
                : `${g.fantasyPts} pts`;
      html += `<div class="pp-game-row">
        <span class="pp-game-opp">Wk${g.week} vs ${g.opponent||'?'}</span>
        <span class="pp-game-val">${val}</span>
      </div>`;
    });
    html += `</div>`;
  }

  document.getElementById('ppBody').innerHTML = html;
}

function closePlayerPanel() {
  document.getElementById('playerPanel').classList.remove('open');
  document.getElementById('panelOverlay').classList.remove('show');
  ACTIVE_PLAYER = null;
}

function askAboutPlayer() {
  if (!ACTIVE_PLAYER) return;
  closePlayerPanel();
  document.getElementById('inputBox').value = `Tell me about ${ACTIVE_PLAYER.name} this week`;
  document.getElementById('inputBox').focus();
}

/* ── DRAWER ── */
function toggleDrawer() {
  const lsb = document.getElementById('lsb');
  const ham = document.getElementById('hamburger');
  const ov  = document.getElementById('drawerOverlay');
  const open = lsb.classList.toggle('open');
  ham.classList.toggle('open', open);
  ov.classList.toggle('show', open);
  document.body.style.overflow = open ? 'hidden' : '';
}
function closeDrawer() {
  document.getElementById('lsb').classList.remove('open');
  document.getElementById('hamburger').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('show');
  document.body.style.overflow = '';
}
window.addEventListener('resize', () => { if (window.innerWidth > 640) closeDrawer(); });

/* ── AUTH / INIT ── */
async function init() {
  const email = localStorage.getItem('gfd_email');
  if (!email) { loadDemo(); return; }
  try {
    const res = await fetch(`${API}/api/user/context?email=${encodeURIComponent(email)}`);
    const data = await res.json();
    if (!data.ok || !data.user.is_pro) { loadDemo(); return; }
    USER = data.user;
    CONTEXT = data.context;
    WATCHLIST = data.context.watchlist || [];
    renderProfile();
    renderWatchlist();
    renderCtxBar();
    sendWelcome();
  } catch (e) {
    loadDemo();
  }
}

function loadDemo() {
  const email = localStorage.getItem('gfd_email') || 'demo@gfdhub.com';
  USER = { email, name: 'Demo User', initials: 'DU' };
  CONTEXT = {
    scoring: 'PPR', platform: 'Yahoo', week: 1, record: '0-0',
    league: ['PPR scoring','10-team league','Yahoo platform'],
    history: []
  };
  WATCHLIST = [];
  renderProfile();
  renderWatchlist();
  renderCtxBar();
  sendWelcome();
}

function renderProfile() {
  const n = USER.name || USER.email.split('@')[0];
  document.getElementById('userName').textContent = n;
  document.getElementById('userInitials').textContent = (n.split(' ').map(w=>w[0]).join('').toUpperCase()).slice(0,2);
  if (!CONTEXT) return;
  document.getElementById('leagueContext').innerHTML = (CONTEXT.league||[]).map(l=>`<div class="mem-item"><div class="mem-dot"></div>${l}</div>`).join('');
  document.getElementById('historyContext').innerHTML = (CONTEXT.history||[]).map(h=>`<div class="hist-item"><span class="hist-week">${h.week}</span>${h.text}</div>`).join('');
}

function renderCtxBar() {
  if (!CONTEXT) return;
  const items = [
    CONTEXT.scoring,
    `Week ${CONTEXT.week}`,
    CONTEXT.record !== '0-0' ? `${CONTEXT.record} record` : null,
  ].filter(Boolean);
  document.getElementById('ctxBar').innerHTML = items.map(i=>`<div class="ctx-item"><div class="ctx-dot"></div>${i}</div>`).join('');
}

function getSeasonContext() {
  const now = new Date();
  const opener      = new Date('2026-09-09');
  const playoffPush = new Date('2026-12-21');
  const nflPlayoffs = new Date('2027-01-05');
  const superBowl   = new Date('2027-02-09');
  const dateStr = now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

  if (now < opener) {
    return `Current date: ${dateStr}.
We are in the 2026 NFL OFFSEASON / DRAFT PREP period. The 2026 season opener is September 9, 2026 (Wednesday Night Football).
CRITICAL: All player analysis MUST reference 2025 NFL season stats (the most recently completed season, which ended February 2026). Do NOT reference 2024 season stats. Do NOT suggest players who retired, were released, or had significant role changes after the 2025 season. Frame all advice around 2026 draft prep, ADP, and projected roles going into the 2026 season.`;
  }
  if (now < playoffPush) {
    const week = Math.min(Math.floor((now - opener) / (7*24*60*60*1000)) + 1, 17);
    return `Current date: ${dateStr}.
We are in the 2026 NFL REGULAR SEASON, Week ${week}.
CRITICAL: Reference 2026 season stats, current injury reports, and current depth charts. Do NOT reference 2024 or 2025 season stats unless directly relevant for historical context. Focus on 2026 matchups, usage trends, and weekly lineup decisions.`;
  }
  if (now < nflPlayoffs) {
    const week = Math.min(Math.floor((now - opener) / (7*24*60*60*1000)) + 1, 18);
    return `Current date: ${dateStr}.
We are in the 2026 NFL PLAYOFF PUSH, Week ${week}. Fantasy playoffs are here — every call is win or go home.
CRITICAL: Reference 2026 season stats only. Prioritize high-floor players and safe targets over boom/bust options. Every lineup decision is elimination-level stakes.`;
  }
  if (now < superBowl) {
    return `Current date: ${dateStr}.
We are in the 2026-27 NFL PLAYOFFS. Fantasy seasons are over for most leagues.
CRITICAL: Reference 2026 season stats. If the user is still in a fantasy playoff, treat every call as championship-level stakes.`;
  }
  return `Current date: ${dateStr}.
The 2026 NFL season has concluded. We are in the offseason. Reference 2026 season stats for historical context and begin framing 2027 draft prep where relevant.`;
}

function sendWelcome() {
  window._DATE_CTX = getSeasonContext();
  const text = `Welcome to GFDHub. Week ${CONTEXT?.week||1} loaded${WATCHLIST.length ? ` — I see ${WATCHLIST.length} player${WATCHLIST.length>1?'s':''} on your Watchlist` : ''}. What do you need?`;
  addMessage('oc', text);
}

function addMessage(role, html) {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg' + (role==='user'?' user':'');
  const ava = role==='user' ? (USER?.initials||'?') : 'OC';
  div.innerHTML = `
    <div class="msg-ava ${role}">${ava}</div>
    <div class="msg-body">
      <div class="bubble ${role}">${html}</div>
      <div class="msg-time">${role==='user'?'just now':'AI OC · just now'}</div>
    </div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function formatResponse(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')
    .replace(/\n\n/g,'<br><br>')
    .replace(/\n/g,'<br>')
    .replace(/\bSTART\s+([A-Z][a-zA-Z\s']+?)(?=[.,:—\n]|$)/g,'<span class="call-tag call-start">▲ START $1</span>')
    .replace(/\bSIT\s+([A-Z][a-zA-Z\s']+?)(?=[.,:—\n]|$)/g,'<span class="call-tag call-sit">▽ SIT $1</span>')
    .replace(/\bADD\s+([A-Z][a-zA-Z\s']+?)(?=[.,:—\n]|$)/g,'<span class="call-tag call-add">+ ADD $1</span>')
    .replace(/\bDROP\s+([A-Z][a-zA-Z\s']+?)(?=[.,:—\n]|$)/g,'<span class="call-tag call-drop">× DROP $1</span>');
}

async function sendMessage() {
  if (WAITING) return;
  const box = document.getElementById('inputBox');
  const q = box.value.trim();
  if (!q) return;
  box.value = '';
  box.style.height = 'auto';
  addMessage('user', q);
  MSGS.push({ role:'user', content:q });
  WAITING = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('typing').classList.add('show');
  document.getElementById('messages').scrollTop = 99999;

  // Extract and add player names to watchlist (async, non-blocking)
  const names = extractPlayerNames(q);
  if (names.length) resolveAndAddPlayers(names);

  const wlContext = WATCHLIST.length
    ? `User's Watchlist (players they've asked about): ${WATCHLIST.map(p=>`${p.name} (${p.pos})`).join(', ')}`
    : 'Watchlist is empty — first session';

  const systemPrompt = `You are the GFDHub AI Offensive Coordinator — the sharpest, most confident fantasy football analyst available. You make data-backed lineup decisions and always give ONE clear recommendation.

${window._DATE_CTX || 'Current date: June 2026. The 2026 NFL season starts September 4, 2026. We are in the pre-season/draft prep period.'}

USER'S LEAGUE PROFILE:
- Scoring: ${CONTEXT?.scoring||'PPR'}, Platform: ${CONTEXT?.platform||'Yahoo'}, Week ${CONTEXT?.week||1}
- ${wlContext}
- Their history with you: ${(CONTEXT?.history||[]).map(h=>`${h.week}: ${h.text}`).join(' | ')||'First session'}

RESPONSE RULES:
1. Lead with the call: START [Name], SIT [Name], ADD [Name], or DROP [Name] — all caps
2. Back it with 1-2 stats or matchup facts (be specific — yards allowed, snap counts, target share)
3. Reference their scoring format and watchlist when relevant
4. 3-5 sentences max — this is a chat interface, not an article
5. Never hedge or say "it depends" — make the call
6. Sound like an expert coordinator who's watched the film`;

  try {
    const res = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: systemPrompt, messages: MSGS.slice(-10) })
    });
    const data = await res.json();
    const answer = data.answer || "Couldn't reach the AI right now. Try again in a moment.";
    MSGS.push({ role:'assistant', content:answer });

    fetch(`${API}/api/chat/save`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: USER?.email, question: q, answer, week: CONTEXT?.week })
    }).catch(()=>{});

    document.getElementById('typing').classList.remove('show');
    addMessage('oc', formatResponse(answer));
  } catch(e) {
    document.getElementById('typing').classList.remove('show');
    addMessage('oc', 'Having trouble connecting right now. Try again in a moment.');
  }
  WAITING = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('inputBox').focus();
}

function quickAsk(q) {
  document.getElementById('inputBox').value = q;
  sendMessage();
}

function clearChat() {
  document.getElementById('messages').innerHTML = '';
  MSGS.length = 0;
  sendWelcome();
}

function handleKey(e) {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

init();
</script>
</body>
</html>
